    <!-- ============================================================
         TIME ZONES — edit city name, IANA timezone (data-tz),
         and the two link URLs. Clock + abbreviation auto-update.
         IANA list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
         ============================================================ -->
    <div class="times">
      <p class="time-row" data-tz="America/Indiana/Indianapolis">

      </p>

        <a href="https://24timezones.com/world_directory/current_san_francisco_time.php">time in san francisco</a>
        — <span class="clock">—</span>
        <a href="https://24timezones.com/time-zone/pt"><span class="tz-abbr">—</span></a>
      </p>
      <p class="time-row" data-tz="Asia/Shanghai">

        — <span class="clock">—</span>

    </div>
